<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <div class="starting">
        <div class="title">Weather-App</div>
    <img src="Group 1.png" alt="" class="logo">
    </div>
    
    <div class="container">
        <div class="top-section">
            <div class="input-search">
                <input type="text" class="txt" placeholder="Search City" >
                
                <button class="search"><img src="Search (1).png" alt=""></button>
                
                
                
            </div>
            <div class="location-container">
                <img src="Location Icon.png" alt="">
            </div>
        </div>
        
       
        
        
        
         <div class="mini-container">
            <div class="name-image">
                <p class="city">London</p>
                <img src="clouds.png" alt="" class="icon">
                <p class="temp">23°C</p>
            </div>
            <div class="humidity-speed">
                <div class="humidity-grid">
                    <img src="humidity.png" alt="" class="humidity-img">
                    <div class="humidity-details">
                       <p class="humidity">23%</p>
                       <p class="hum">Humidity</p>
                    </div>
                </div>
                 
                 <div class="speed-grid">
                    <img src="wind.png" alt="" class="windSpeed-image">
                 <div class="windSpeed-details">
                    <p class="wind-speed">4m/s</p>
                    <p class="win">Wind Speed</p>
                 </div>
                 </div>
            </div>
         </div>
        
    </div>
<script src="script.js"></script>    
</body>
</html>
